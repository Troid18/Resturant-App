<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>

    <header>
        <img src="./images/logo.png" alt="A chef hat with a fork and spoon" class="logo">
        <div class="head-info">
            <h1>Troid Resturant</h1>
            <p>The best burgers and pizzas in town</p>
            
            
        </div>
        
    </header>

    <main>

        <section class="content" id="content">
            
        </section>

        <section class="order-summary" id="order-summary">
            <!-- Orders will render here -->
        </section>
        
        <section class="card-details" id="card-details">
            <form class="form-details" id="form-details">
                <h1 id="form-head">Enter card details</h1>
                <input type="text" aria-label="Enter your name" placeholder="Enter your name" class="details" required id="name-input" title="Please enter your name" name="username">
                <input type="text" aria-label="Enter your card number" placeholder="Enter your card number" class="details" id="card-input" required title="Please enter your card number" maxlength="19" oninput="formatCardNumber()">
                <input type="text" aria-label="Enter your CVV" placeholder="Enter your CVV" class="details" required id="cvv-input" title="Please enter your CVV" maxlength="3" pattern="[0-9]{3}">
                <button type="submit" class="pay-btn" id="pay-btn" disabled>Pay</button>          
            </form>

        </section>
        
        

    </main>

    <script src="./index.js" type="module" ></script>
    <script src="./format.js"></script>
</body>
</html>
