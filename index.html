<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>

    <header>
        <img src="./images/logo.png" alt="A chef hat with a fork and spoon" class="logo">
        <div class="head-info">
            <h1>Troid Resturant</h1>
            <p>The best burgers and pizzas in town</p>

        </div>
        
    </header>

    <main>

        <section class="content" id="content">
            
        </section>

        <section class="card-details">
            <form class="form-details">
                <h1 id="form-head">Enter card details</h1>
                <input type="text" aria-label="Enter your name" placeholder="Enter your name" class="details" required title="Please enter your name">
                <input type="text" aria-label="Enter your card number" placeholder="Enter your card number" class="details" required title="please enter your card number">
                <input type="text" aria-label="Enter your name" placeholder="Enter your CVV" class="details" required title="Please enter your CCV" min="3" max="3">
                <button type="submit" class="pay-btn">Pay</button>
            </form>

        </section>

    </main>

    <script src="./index.js" type="module" ></script>
    
</body>
</html>
